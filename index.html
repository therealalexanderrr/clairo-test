<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clairo Song Soulmate Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6b7a6d;
            --bg-filter: linear-gradient(rgba(245, 242, 235, 0.5), rgba(234, 221, 202, 0.5));
            --glass-block: rgba(255, 255, 255, 0.5); 
            --cream-white: #f5f5dc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-filter), url('charm-bg.JPG') no-repeat center center fixed;
            background-size: cover;
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 模仿图2：更细致的进度条 */
        .progress-wrapper {
            width: 100%; height: 2px; background: rgba(0,0,0,0.05); margin-bottom: 30px;
        }
        .progress-bar { 
            height: 100%; background-color: var(--primary); width: 0%; 
            transition: width 0.4s ease; 
        }

        #quiz-container { width: 88%; max-width: 420px; position: relative; z-index: 2; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 50px 25px 40px 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center;
        }

        /* 音乐图标 */
        .music-player-ctrl { position: absolute; top: 20px; right: 20px; z-index: 100; }
        #music-toggle {
            background: rgba(255, 255, 255, 0.6); border: none;
            border-radius: 50%; width: 38px; height: 38px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .clairo-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; }

        /* 模仿图2：题号显示 */
        .question-meta {
            font-size: 0.7rem; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 15px;
        }

        /* 模仿图2：问题标题样式 */
        .question-text {
            font-family: 'Bodoni Moda', serif; font-size: 1.6rem; line-height: 1.3;
            margin-bottom: 40px; color: #222; text-align: left; padding: 0 5px;
        }

        #quiz-content { display: none; }

        /* 模仿图2：长方形、高透明、细微描边的选项 */
        .option-btn {
            display: block; width: 100%; 
            background: rgba(255, 255, 255, 0.4); 
            border: 1px solid rgba(0, 0, 0, 0.1); /* 细微深色描边 */
            padding: 20px; margin-bottom: 12px; 
            border-radius: 12px; /* 稍微给一点圆角模仿图2的现代感，如需纯直角请改为0 */
            cursor: pointer; color: #333;
            font-family: "STSong", serif; font-style: italic; 
            font-size: 0.95rem; text-align: left; transition: 0.3s;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .option-btn:hover { 
            background: rgba(255, 255, 255, 0.8); 
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* 返回上一题：毛玻璃背景 */
        .back-btn-wrapper { margin-top: 30px; }
        .back-btn {
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px);
            color: #999; border: none; padding: 10px 20px; border-radius: 0;
            font-size: 0.8rem; cursor: pointer; font-style: italic;
        }

        /* 署名小字 */
        .signature {
            margin-top: 20px; font-size: 0.75rem; color: #aaa; 
            font-family: 'Bodoni Moda', serif; font-style: italic;
        }

        /* 结果页紧凑化 */
        #result-title { font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 1.8rem; color: var(--primary); margin: 10px 0; }
        #result-desc { font-size: 0.85rem; line-height: 1.6; color: #444; margin-bottom: 20px; }
        .track-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.75rem; }
        .match-bar-visual { width: 50px; height: 3px; background: rgba(0,0,0,0.05); position: relative; }
        .match-bar-fill { height: 100%; background: var(--primary); }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="intro-page" class="glass-panel">
        <img src="clairo.jpg" class="clairo-avatar" style="margin-bottom: 20px;">
        <h1 style="font-family:'Bodoni Moda'; font-style:italic; color:var(--primary); font-size:2.5rem; margin:0;">Clairo</h1>
        <p style="font-style:italic; color:#666; margin-bottom:40px;">Find your soul track.</p>
        <button onclick="startQuiz()" style="background:var(--primary); color:white; border:none; padding:15px 40px; border-radius:30px; cursor:pointer;">START</button>
    </div>

    <div id="quiz-content" class="glass-panel">
        <div class="progress-wrapper"><div class="progress-bar" id="progress"></div></div>
        <div class="question-meta" id="q-meta">QUESTION 01 / 15</div>
        <div id="question-display"></div>
        
        <div class="back-btn-wrapper">
            <button id="back-link" class="back-btn" onclick="prevQuestion()" style="display:none;">← Back to previous question</button>
        </div>
        <div class="signature">by ClairoDaily</div>
    </div>

    <div id="result-container" class="glass-panel" style="display:none;">
        <img src="" class="clairo-avatar" id="result-img" style="width:80px; height:80px;">
        <div id="result-title"></div>
        <div id="result-desc"></div>
        <div style="font-size:0.6rem; letter-spacing:2px; color:#ccc; margin:20px 0 10px;">TOP 5 CORRELATION</div>
        <div id="track-list-container"></div>
        <button class="option-btn" style="text-align:center; border:none; margin-top:30px;" onclick="location.reload()">RETAKE TEST</button>
        <div class="signature">by ClairoDaily</div>
    </div>
</div>

<div class="music-player-ctrl">
    <button id="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
</div>

<script>
    const questions = [
        { q: "How do you usually approach a slow-burn connection?", options: { A: "I secretly love the tension.", B: "I often retreat, fantasy is safer.", C: "I embrace the chaos.", D: "I analyze every tiny detail." }},
        // ... (此处保留你之前的15道题)
    ];

    const songs = {
        'A': [{ title: "Pretty Girl", lyric: "I could be a pretty girl...", desc: "Bedroom lo-fi fantasy." }],
        'B': [{ title: "Bags", lyric: "Can you see me?", desc: "Vulnerability is your strength." }],
        'C': [{ title: "Blouse", lyric: "Why do I tell you how I feel?", desc: "Quiet power of nature." }],
        'D': [{ title: "Juna", lyric: "You make me feel like a girl", desc: "Charming and mysterious." }]
    };

    let scores = { A: 0, B: 0, C: 0, D: 0 };
    let currentStep = 0;
    let choiceHistory = [];

    function startQuiz() {
        document.getElementById('intro-page').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentStep];
        document.getElementById('q-meta').innerText = `QUESTION ${String(currentStep + 1).padStart(2, '0')} / 15`;
        document.getElementById('question-display').innerHTML = `
            <div class="question-text">${qData.q}</div>
            ${Object.entries(qData.options).map(([k, v]) => `<button class="option-btn" onclick="handleSelect('${k}')">${v}</button>`).join('')}
        `;
        document.getElementById('progress').style.width = ((currentStep + 1) / questions.length) * 100 + '%';
        document.getElementById('back-link').style.display = currentStep > 0 ? 'inline-block' : 'none';
    }

    function handleSelect(key) {
        scores[key]++;
        choiceHistory.push(key);
        if (currentStep < questions.length - 1) { currentStep++; renderQuestion(); }
        else { showResult(); }
    }

    function prevQuestion() {
        if (currentStep > 0) { scores[choiceHistory.pop()]--; currentStep--; renderQuestion(); }
    }

    function showResult() {
        document.getElementById('quiz-content').style.display = 'none';
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const main = songs[winner][0];
        
        document.getElementById('result-title').innerText = main.title;
        document.getElementById('result-desc').innerText = main.desc;
        document.getElementById('result-img').src = winner + ".jpg"; // 对应图片名
        
        // 模拟相关度列表
        let listHtml = "";
        ['Bags', 'Sofia', 'Amoeba', 'Zinnias', 'Nomad'].forEach(t => {
            const rel = (Math.random() * 30 + 60).toFixed(1);
            listHtml += `<div class="track-item"><span>${t}</span><div style="display:flex; align-items:center; gap:10px;"><span>${rel}%</span><div class="match-bar-visual"><div class="match-bar-fill" style="width:${rel}%"></div></div></div></div>`;
        });
        document.getElementById('track-list-container').innerHTML = listHtml;
        document.getElementById('result-container').style.display = 'block';
    }

    function toggleMusic() {
        const a = document.getElementById('bgm');
        a.paused ? a.play() : a.pause();
    }
</script>
</body>
</html>
