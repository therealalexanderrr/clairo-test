<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clairo Song Soulmate Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6b7a6d;
            --bg-filter: linear-gradient(rgba(245, 242, 235, 0.5), rgba(234, 221, 202, 0.5));
            --glass-block: rgba(255, 255, 255, 0.9);
            --cream-white: #f5f5dc; /* 米白色 */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-filter), url('charm-bg.JPG') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 进度条：固定在页面最顶端，米白色 */
        .progress-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 5px;
            background-color: rgba(255, 255, 255, 0.2); z-index: 1000;
        }
        .progress-bar { 
            height: 100%; 
            background-color: var(--cream-white); 
            width: 0%; 
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(255, 255, 220, 0.5);
        }

        #quiz-container { width: 82%; max-width: 380px; position: relative; text-align: center; z-index: 2; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 45px 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .music-player-ctrl { position: absolute; top: 20px; right: 20px; z-index: 100; }
        #music-toggle {
            background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50%; width: 38px; height: 38px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .rotating { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .clairo-avatar {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 3px solid white; box-shadow: 0 6px 18px rgba(0,0,0,0.07);
        }

        h1, #result-title { font-family: 'Bodoni Moda', serif; font-weight: 400; font-style: italic; color: var(--primary); margin: 0; }
        h1 { font-size: 2.6rem; margin-bottom: 15px; }
        .intro-desc { font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 1rem; line-height: 1.6; color: #555; margin-bottom: 35px; }

        #quiz-content { display: none; text-align: left; }
        .question-text {
            font-family: "STSong", "SimSun", "Songti SC", serif; font-size: 1.2rem; margin-bottom: 25px; 
            font-weight: 600; color: #000; background: var(--glass-block); padding: 22px; border-radius: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .option-btn {
            display: block; width: 100%; background: var(--glass-block); border: 1px solid rgba(255,255,255,0.4);
            padding: 18px 20px; margin-bottom: 12px; border-radius: 14px; cursor: pointer; color: #000;
            font-family: "STSong", "SimSun", "Songti SC", serif; font-style: italic; font-size: 1.05rem;
            text-align: left; transition: 0.2s; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .option-btn:hover { background: white; transform: translateX(4px); border-color: var(--primary); }

        .back-btn {
            background: transparent; color: var(--primary); border: none; font-size: 0.85rem;
            cursor: pointer; margin-top: 10px; opacity: 0.6; font-style: italic; display: block; width: 100%; text-align: center;
        }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px 50px; border-radius: 30px; font-size: 1rem; cursor: pointer; font-weight: 500; }

        #result-container { display: none; }
        .result-era {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--primary);
            background: rgba(107, 122, 109, 0.1); padding: 5px 15px; border-radius: 15px; display: inline-block; margin: 15px 0;
        }
        #result-desc { font-family: "STSong", "SimSun", "Songti SC", serif; line-height: 1.8; color: #222; text-align: justify; }
    </style>
</head>
<body>

<div class="progress-container">
    <div class="progress-bar" id="progress"></div>
</div>

<div class="music-player-ctrl">
    <button id="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
</div>

<div id="quiz-container">
    <div id="intro-page" class="glass-panel">
        <img src="clairo.jpg" alt="Intro" class="clairo-avatar" style="margin-bottom: 25px;">
        <h1>Clairo</h1>
        <p class="intro-desc">Which Clairo song defines your soul? From the bedroom lo-fi beats of Diary 001 to the charming melodies of Charm. Step into the haze and find your track.</p>
        <button class="primary-btn" onclick="startQuiz()">开始测试</button>
    </div>

    <div id="quiz-content">
        <div id="question-display"></div>
        <button id="back-link" class="back-btn" onclick="prevQuestion()" style="display:none;">← Back to previous question</button>
    </div>

    <div id="result-container" class="glass-panel">
        <img src="" alt="Result" class="clairo-avatar" id="result-era-image" style="width:100px; height:100px;">
        <div style="font-family: 'Bodoni Moda', serif; font-style: italic; color: #888; margin-top:15px;">Your soul track is</div>
        <div id="result-title" style="font-size: 2.4rem;"></div>
        <div class="result-era" id="result-era"></div>
        <div id="result-desc"></div>
        <button class="option-btn" style="text-align:center; border:none; color:var(--primary); font-weight:bold; margin-top:30px;" onclick="location.reload()">RETAKE TEST</button>
    </div>
</div>

<script>
    const questions = [
        { q: "深夜独自一人时，你更倾向于？", options: { A: "开一点轻快的音乐顺便自拍", B: "陷入一段挥之不去的旧回忆", C: "点亮香薰，享受当下的宁静", D: "给心仪的人发一段意味深长的话" }},
        { q: "你理想中的旅行目的地是？", options: { A: "充满活力的街头跳蚤市场", B: "潮湿的古老城市", C: "深山里的木屋", D: "午后咖啡馆" }},
        { q: "哪种声音最让你感到治愈？", options: { A: "录音机的电流声", B: "敲击车窗的雨声", C: "森林里的鸟鸣", D: "冰块撞击杯子的声音" }},
        { q: "把感情比作物件？", options: { A: "一张曝光的照片", B: "一件旧卫衣", C: "一个小盆栽", D: "一瓶昂贵香水" }},
        { q: "在社交场合中，你通常扮演？", options: { A: "搞怪活跃的人", B: "照顾朋友的人", C: "角落观察的人", D: "难以捉摸的人" }},
        { q: "哪种穿着最自信？", options: { A: "多巴胺混搭", B: "大号连帽衫", C: "素色棉麻", D: "复古真丝" }},
        { q: "如何看待“孤独”？", options: { A: "灵感来源", B: "自由重生", C: "无法逃避的常态", D: "清醒的高级状态" }},
        { q: "房间装饰风格？", options: { A: "杂志和海报", B: "植物和暖灯", C: "极简小秘密", D: "电影质感" }},
        { q: "面对未来？", options: { A: "顺其自然", B: "渴望安稳", C: "忧虑但尝试", D: "优雅掌控" }},
        { q: "此刻想喝？", options: { A: "苏打水", B: "草本茶", C: "黑咖啡", D: "鸡尾酒" }},
        { q: "关系结束时？", options: { A: "找朋友开派对", B: "写一首诗", C: "独自旅行", D: "反复翻看记录" }},
        { q: "哪种“怀旧”？", options: { A: "互联网像素", B: "80年代合成器", C: "70年代木吉他", D: "60年代爵士" }},
        { q: "生活像哪种电影？", options: { A: "公路片", B: "艺术片", C: "纪实片", D: "情感片" }},
        { q: "艺术形式？", options: { A: "Vlog", B: "胶片", C: "陶瓷", D: "黑胶" }},
        { q: "希望结果告诉你？", options: { A: "我依然纯真", B: "脆弱被理解", C: "找到宁静", D: "迷人且高级" }}
    ];

    const songs = {
        'A': [{ title: "Pretty Girl", era: "Diary 001", desc: "你是卧室里的 lo-fi 幻想家。哪怕生活模糊不清，也能把它变成艺术。纯真、自由，拥有无可取代的卧室美学。" }],
        'B': [{ title: "Bags", era: "Immunity", desc: "你是时代最深刻的灵魂。明白脆弱才是最强大的武器。憂鬱却具有治愈他人的力量。" }],
        'C': [{ title: "Blouse", era: "Sling", desc: "宁静旷野里的吟唱者。你沉静、宽厚，充满了回归大地的宁静感，懂得温柔的力量。" }],
        'D': [{ title: "Juna", era: "Charm", desc: "轻盈且灵动的魅力，掌控着审美的张力，是社交场合中难以捉摸的神秘人。" }]
    };

    let scores = { A: 0, B: 0, C: 0, D: 0 };
    let currentStep = 0;
    let choiceHistory = [];

    function toggleMusic() {
        const audio = document.getElementById('bgm');
        const btn = document.getElementById('music-toggle');
        if (audio.paused) { audio.play(); btn.classList.add('rotating'); }
        else { audio.pause(); btn.classList.remove('rotating'); }
    }

    function startQuiz() {
        document.getElementById('intro-page').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        document.getElementById('bgm').play().catch(() => {});
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentStep];
        document.getElementById('question-display').innerHTML = `
            <div class="question-text">${qData.q}</div>
            ${Object.entries(qData.options).map(([k, v]) => `<button class="option-btn" onclick="handleSelect('${k}')">${v}</button>`).join('')}
        `;
        document.getElementById('progress').style.width = (currentStep / questions.length) * 100 + '%';
        document.getElementById('back-link').style.display = currentStep > 0 ? 'block' : 'none';
    }

    function handleSelect(key) {
        scores[key]++;
        choiceHistory.push(key);
        if (currentStep < questions.length - 1) { currentStep++; renderQuestion(); }
        else { showResult(); }
    }

    function prevQuestion() {
        if (currentStep > 0) {
            const lastChoice = choiceHistory.pop();
            scores[lastChoice]--;
            currentStep--;
            renderQuestion();
        }
    }

    function showResult() {
        document.getElementById('quiz-content').style.display = 'none';
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const final = songs[winner][0];
        const img = document.getElementById('result-era-image');
        if(winner === 'A') img.src = 'diary001.JPG';
        else if(winner === 'B') img.src = 'immunity.JPG';
        else if(winner === 'C') img.src = 'sling.jpg';
        else img.src = 'charm.JPG';
        document.getElementById('result-title').innerText = final.title;
        document.getElementById('result-era').innerText = final.era;
        document.getElementById('result-desc').innerText = final.desc;
        document.getElementById('result-container').classList.add('glass-panel');
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('progress').style.width = '100%';
    }
</script>
</body>
</html>
