<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clairo Song Soulmate Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6b7a6d;
            --bg-filter: linear-gradient(rgba(245, 242, 235, 0.5), rgba(234, 221, 202, 0.5));
            --glass-block: rgba(255, 255, 255, 0.55); 
            --cream-white: #f5f5dc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-filter), url('charm-bg.JPG') no-repeat center center fixed;
            background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        .progress-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 5px;
            background-color: rgba(255, 255, 255, 0.2); z-index: 1000;
        }
        .progress-bar { height: 100%; background-color: var(--cream-white); width: 0%; transition: 0.4s ease; }

        #quiz-container { width: 85%; max-width: 380px; position: relative; text-align: center; z-index: 2; padding: 40px 0; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* 音乐控制 */
        .music-player-ctrl { position: absolute; top: 20px; right: 20px; z-index: 100; }
        #music-toggle {
            background: rgba(255, 255, 255, 0.6); border: none; border-radius: 50%; 
            width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .rotating { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 头像 */
        .clairo-avatar {
            width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
            border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        h1, #result-title { font-family: 'Bodoni Moda', serif; font-weight: 400; font-style: italic; color: var(--primary); margin: 0; }
        h1 { font-size: 2.6rem; margin-bottom: 10px; }

        #quiz-content { display: none; text-align: left; }
        .question-text {
            font-family: "STSong", serif; font-size: 1.1rem; margin-bottom: 25px; font-weight: 600;
            background: var(--glass-block); padding: 22px; border-radius: 0; border: 1px solid rgba(255,255,255,0.4);
        }

        /* 直角 + 高透明 选项 */
        .option-btn {
            display: block; width: 100%; background: rgba(255, 255, 255, 0.45); 
            border: 1px solid rgba(255,255,255,0.3); padding: 16px 20px; margin-bottom: 10px; 
            border-radius: 0; cursor: pointer; color: #000; font-family: "STSong", serif; 
            font-style: italic; font-size: 0.95rem; text-align: left; transition: 0.2s;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.8); border-color: var(--primary); }

        /* 结果页装饰 */
        .lyric-quote { font-family: 'Bodoni Moda', serif; font-style: italic; color: #888; margin: 15px 0; font-size: 0.9rem; line-height: 1.5; padding: 0 15px; }
        .correlation-header { font-size: 0.65rem; letter-spacing: 2px; color: #aaa; margin-top: 35px; border-top: 1px solid #eee; padding-top: 15px; }
        .track-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 0.85rem; color: #555; }
        .track-percent { font-family: 'Bodoni Moda', serif; font-style: italic; color: var(--primary); font-weight: 500; }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 15px 45px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="progress-container"><div class="progress-bar" id="progress"></div></div>

<div class="music-player-ctrl">
    <button id="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
</div>

<div id="quiz-container">
    <div id="intro-page" class="glass-panel">
        <img src="clairo.jpg" class="clairo-avatar" style="margin-bottom: 20px;">
        <h1>Clairo</h1>
        <p style="font-family:'Bodoni Moda', serif; font-style:italic; color:#666; margin-bottom:30px;">Which song defines your soul?</p>
        <button class="primary-btn" onclick="startQuiz()">开始测试</button>
    </div>

    <div id="quiz-content">
        <div id="question-display"></div>
        <div style="text-align: center;">
            <button id="back-link" style="background:none; border:none; color:#bbb; font-style:italic; font-size:0.8rem; cursor:pointer; display:none; margin-top:20px;" onclick="prevQuestion()">← Back</button>
        </div>
    </div>

    <div id="result-container" class="glass-panel" style="display:none;">
        <img src="" class="clairo-avatar" id="result-img">
        <div id="result-title" style="font-size: 2.2rem; margin-top:15px;"></div>
        <div id="result-lyric" class="lyric-quote"></div>
        <div id="result-desc" style="font-family:'STSong', serif; font-size:0.95rem; line-height:1.6; color:#444; text-align:justify;"></div>
        
        <div class="correlation-header">TOP 5 CORRELATION TRACKS</div>
        <div id="track-list-container"></div>

        <button class="option-btn" style="text-align:center; margin-top:35px; color:var(--primary); font-weight:bold; border:none; background:none;" onclick="location.reload()">RETAKE TEST</button>
    </div>
</div>

<script>
    const questions = [
        { q: "深夜独自一人时，你更倾向于？", options: { A: "开一点轻快的音乐顺便自拍", B: "陷入一段挥之不去的旧回忆", C: "点亮香薰，享受当下的宁静", D: "给心仪的人发一段意味深长的话" }},
        { q: "你理想中的旅行目的地是？", options: { A: "充满活力的街头跳蚤市场", B: "潮湿的古老城市", C: "深山里的木屋", D: "午后咖啡馆" }},
        { q: "哪种声音最让你感到治愈？", options: { A: "录音机的电流声", B: "敲击车窗的雨声", C: "森林里的鸟鸣", D: "冰块撞击杯子的声音" }},
        { q: "把感情比作物件？", options: { A: "一张曝光的照片", B: "一件旧卫衣", C: "一个小盆栽", D: "一瓶昂贵香水" }},
        { q: "在社交场合中，你通常扮演？", options: { A: "搞怪活跃的人", B: "照顾朋友的人", C: "角落观察的人", D: "难以捉摸的人" }},
        { q: "哪种穿着最自信？", options: { A: "多巴胺混搭", B: "大号连帽衫", C: "素色棉麻", D: "复古真丝" }},
        { q: "如何看待“孤独”？", options: { A: "灵感来源", B: "自由重生", C: "无法逃避的常态", D: "清醒的高级状态" }},
        { q: "房间装饰风格？", options: { A: "杂志和海报", B: "植物和暖灯", C: "极简小秘密", D: "电影质感" }},
        { q: "面对未来？", options: { A: "顺其自然", B: "渴望安稳", C: "忧虑但尝试", D: "优雅掌控" }},
        { q: "此刻想喝？", options: { A: "苏打水", B: "草本茶", C: "黑咖啡", D: "鸡尾酒" }},
        { q: "关系结束时？", options: { A: "找朋友开派对", B: "写一首诗", C: "独自旅行", D: "反复翻看记录" }},
        { q: "哪种“怀旧”？", options: { A: "互联网像素", B: "80年代合成器", C: "70年代木吉他", D: "60年代爵士" }},
        { q: "生活像哪种电影？", options: { A: "公路片", B: "艺术片", C: "纪实片", D: "情感片" }},
        { q: "艺术形式？", options: { A: "Vlog", B: "胶片", C: "陶瓷", D: "黑胶" }},
        { q: "希望结果告诉你？", options: { A: "我依然纯真", B: "脆弱被理解", C: "找到宁静", D: "迷人且高级" }}
    ];

    const songs = {
        'A': [
            { title: "Pretty Girl", lyric: "\"I could be a pretty girl, I'll wear a skirt for you.\"", desc: "你是卧室里的 lo-fi 幻想家，哪怕生活模糊不清，也能把它变成艺术。" },
            { title: "Flaming Hot Cheetos", lyric: "\"I'm sent for you, I'm sent for you.\"", desc: "你拥有最古灵精怪的灵魂，在自嘲与浪漫之间保持着平衡。" },
            { title: "4EVER", lyric: "\"Is it last forever? Or is it just until the summer's end?\"", desc: "向往永恒的夏日，复古且充满活力的节奏是你生活的底色。" },
            { title: "Hello?", lyric: "\"I'm just a little bit out of my mind.\"", desc: "你总是那个先开口问候的人，内心充满好奇与青涩的探索欲。" },
            { title: "B.O.M.D.", lyric: "\"You're the boy of my dreams.\"", desc: "纯真美学的代言人，总能在人群中发现让你心跳加速的梦中人。" }
        ],
        'B': [
            { title: "Bags", lyric: "\"Can you see me? I'm waiting for the right time.\"", desc: "明白脆弱才是最强大的武器，在情感拉扯中学会了优雅地安放内心。" },
            { title: "Sofia", lyric: "\"Sofia, know that you and I shouldn't feel like a crime.\"", desc: "敢于直面内心最热烈的渴望，你的爱坚定且富有生命力。" },
            { title: "Alewife", lyric: "\"Eighty-some days and I'm still alive.\"", desc: "有一颗细腻且知恩图报的心。在黑暗时刻，总能找到救命稻草。" },
            { title: "Softly", lyric: "\"Touch me softly, don't let it go.\"", desc: "温柔地对待世界，轻盈的节奏是你对自由的向往。" },
            { title: "Impossible", lyric: "\"I'm a little bit tired of this.\"", desc: "清醒的浪漫主义者。明白遗憾是常态，但依然保持独特审美。" }
        ],
        'C': [
            { title: "Blouse", lyric: "\"Why do I tell you how I feel? When you're just looking at my blouse.\"", desc: "宁静旷野里的吟唱者。沉静、宽厚，充满了回归大地的宁静感。" },
            { title: "Amoeba", lyric: "\"Show up to the party just to leave.\"", desc: "在琐碎生活中思考存在的意义，有着顽强且低调的生命力。" },
            { title: "Zinnias", lyric: "\"Quietly, I'll be the one you need.\"", desc: "向往田园牧歌般的自由，渴望在自己的土地上种下希望。" },
            { title: "Just For Today", lyric: "\"I'm just trying to make it through.\"", desc: "深情的观察者，明白有些情感只需要在“今天”得到宣泄。" },
            { title: "Management", lyric: "\"Complain to the management.\"", desc: "寻找掌控生活的能力，迷茫中最终会在音乐中找到秩序。" }
        ],
        'D': [
            { title: "Juna", lyric: "\"You make me feel like a girl, go on and try it.\"", desc: "掌控着审美的张力。你是社交场合中难以捉摸的神秘人。" },
            { title: "Sexy to Someone", lyric: "\"I'm sexy to someone, I'm sure.\"", desc: "自信展示自己的张力，这种能量让你在人群中熠熠生辉。" },
            { title: "Add Up My Love", lyric: "\"You're the one I'm thinking of.\"", desc: "对感情有精准计算和热烈投入，复古节奏是你的跳动。" },
            { title: "Terrapin", lyric: "\"Slow down, you're moving too fast.\"", desc: "像一只优雅的玳瑁，在时间流动中慢行，享受当下的质感。" },
            { title: "Nomad", lyric: "\"I'm a nomad, I'm a traveler.\"", desc: "有一颗流浪的心，不愿被定义束缚。你在不同情绪中迁徙。" }
        ]
    };

    let scores = { A: 0, B: 0, C: 0, D: 0 };
    let currentStep = 0;
    let choiceHistory = [];

    function toggleMusic() {
        const audio = document.getElementById('bgm');
        if (audio.paused) { audio.play(); document.getElementById('music-toggle').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('music-toggle').innerText = "🎵"; }
    }

    function startQuiz() {
        document.getElementById('intro-page').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentStep];
        document.getElementById('question-display').innerHTML = `
            <div class="question-text">${qData.q}</div>
            ${Object.entries(qData.options).map(([k, v]) => `<button class="option-btn" onclick="handleSelect('${k}')">${v}</button>`).join('')}
        `;
        document.getElementById('progress').style.width = (currentStep / questions.length) * 100 + '%';
        document.getElementById('back-link').style.display = currentStep > 0 ? 'inline-block' : 'none';
    }

    function handleSelect(key) {
        scores[key]++;
        choiceHistory.push(key);
        if (currentStep < questions.length - 1) { currentStep++; renderQuestion(); }
        else { showResult(); }
    }

    function prevQuestion() {
        if (currentStep > 0) { scores[choiceHistory.pop()]--; currentStep--; renderQuestion(); }
    }

    function showResult() {
        document.getElementById('quiz-content').style.display = 'none';
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        // 随机主歌曲
        const albumPool = songs[winner];
        const main = albumPool[Math.floor(Math.random() * albumPool.length)];
        
        document.getElementById('result-img').src = { A: 'diary001.JPG', B: 'immunity.JPG', C: 'sling.jpg', D: 'charm.JPG' }[winner];
        document.getElementById('result-title').innerText = main.title;
        document.getElementById('result-lyric').innerText = main.lyric;
        document.getElementById('result-desc').innerText = main.desc;

        // 计算所有歌曲匹配度
        let allResults = [];
        Object.keys(songs).forEach(key => {
            const baseWeight = (scores[key] / questions.length);
            songs[key].forEach(s => {
                if(s.title !== main.title) {
                    // 算法：基础权重 + 随机微调
                    let matchPercent = (baseWeight * 85 + 10 + Math.random() * 5).toFixed(1);
                    allResults.push({ title: s.title, match: matchPercent });
                }
            });
        });

        const top5 = allResults.sort((a, b) => b.match - a.match).slice(0, 5);
        document.getElementById('track-list-container').innerHTML = top5.map(s => 
            `<div class="track-item"><span>${s.title}</span><span class="track-percent">${s.match}%</span></div>`
        ).join('');

        document.getElementById('result-container').style.display = 'block';
        document.getElementById('progress').style.width = '100%';
    }
</script>
</body>
</html>
