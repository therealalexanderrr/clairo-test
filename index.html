<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clairo Song Soulmate Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6b7a6d;
            --bg-filter: linear-gradient(rgba(245, 242, 235, 0.5), rgba(234, 221, 202, 0.5));
            --glass-block: rgba(255, 255, 255, 0.5); 
            --cream-white: #f5f5dc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-filter), url('charm-bg.JPG') no-repeat center center fixed;
            background-size: cover;
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 顶部进度条 */
        .progress-wrapper { width: 100%; height: 2px; background: rgba(0,0,0,0.05); margin-bottom: 30px; }
        .progress-bar { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.4s ease; }

        #quiz-container { width: 88%; max-width: 420px; position: relative; z-index: 2; padding: 20px 0; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 45px 25px 35px 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); text-align: center;
        }

        /* 音乐控制 */
        .music-player-ctrl { position: absolute; top: 20px; right: 20px; z-index: 100; }
        #music-toggle {
            background: rgba(255, 255, 255, 0.6); border: none; border-radius: 50%; 
            width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .rotating { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .clairo-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .question-meta { font-size: 0.7rem; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 12px; }

        .question-text {
            font-family: 'Bodoni Moda', serif; font-size: 1.5rem; line-height: 1.3;
            margin-bottom: 35px; color: #222; text-align: left; font-weight: 500;
        }

        /* 选项：直角、高透明、细描边 */
        .option-btn {
            display: block; width: 100%; background: rgba(255, 255, 255, 0.45); 
            border: 1px solid rgba(0, 0, 0, 0.08); padding: 18px 20px; margin-bottom: 12px; 
            border-radius: 0; cursor: pointer; color: #333;
            font-family: "STSong", serif; font-style: italic; font-size: 1rem; text-align: left; transition: 0.3s;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.8); border-color: var(--primary); transform: translateX(5px); }

        /* 返回上一题毛玻璃背景块 */
        .back-btn-wrapper { margin-top: 30px; display: flex; justify-content: center; }
        .back-btn {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #888; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 25px; border-radius: 0;
            font-size: 0.75rem; cursor: pointer; font-style: italic; transition: 0.3s;
        }

        .signature { margin-top: 25px; font-size: 0.7rem; color: #bbb; font-family: 'Bodoni Moda', serif; font-style: italic; letter-spacing: 1px; }

        /* 结果页紧凑化 */
        #result-title { font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 1.9rem; color: var(--primary); margin: 8px 0; }
        .lyric-box { font-family: 'Bodoni Moda', serif; font-style: italic; color: #999; font-size: 0.85rem; margin-bottom: 12px; padding: 0 10px; line-height: 1.4; }
        #result-desc { font-family: "STSong", serif; font-size: 0.85rem; line-height: 1.6; color: #555; text-align: justify; margin-bottom: 20px; }
        
        /* 匹配度列表与进度条 */
        .track-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 0.8rem; color: #666; font-style: italic; }
        .match-bar-visual { width: 45px; height: 3px; background: rgba(0,0,0,0.05); position: relative; margin-left: 8px; border-radius: 2px; }
        .match-bar-fill { height: 100%; background: var(--cream-white); box-shadow: 0 0 5px rgba(255,255,220,0.8); border-radius: 2px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="intro-page" class="glass-panel">
        <img src="clairo.jpg" class="clairo-avatar" style="margin-bottom: 20px;">
        <h1 style="font-family:'Bodoni Moda'; font-style:italic; color:var(--primary); font-size:2.6rem; margin:0;">Clairo</h1>
        <p style="font-family:'Bodoni Moda'; font-style:italic; color:#777; margin-bottom:40px;">Find your soulmate track.</p>
        <button onclick="startQuiz()" style="background:var(--primary); color:white; border:none; padding:16px 50px; border-radius:30px; cursor:pointer; font-weight:500; letter-spacing:1px;">START TEST</button>
        <div class="signature" style="margin-top:40px;">by ClairoDaily</div>
    </div>

    <div id="quiz-content" class="glass-panel" style="display:none;">
        <div class="progress-wrapper"><div class="progress-bar" id="progress"></div></div>
        <div class="question-meta" id="q-meta">QUESTION 01 / 15</div>
        <div id="question-display"></div>
        <div class="back-btn-wrapper">
            <button id="back-link" class="back-btn" onclick="prevQuestion()" style="display:none;">← Back to previous question</button>
        </div>
        <div class="signature">by ClairoDaily</div>
    </div>

    <div id="result-container" class="glass-panel" style="display:none;">
        <img src="" class="clairo-avatar" id="result-img" style="width:90px; height:90px;">
        <div style="font-family:'Bodoni Moda'; font-style:italic; color:#aaa; font-size:0.75rem; margin-top:15px;">Your soul track is</div>
        <div id="result-title"></div>
        <div id="result-lyric" class="lyric-box"></div>
        <div id="result-desc"></div>
        
        <div style="font-size:0.6rem; letter-spacing:2px; color:#ccc; margin:25px 0 10px; border-top:1px solid #eee; padding-top:15px;">TOP 5 CORRELATION TRACKS</div>
        <div id="track-list-container"></div>
        
        <button class="option-btn" style="text-align:center; border:none; margin-top:30px; color:var(--primary); font-weight:bold; border-radius:0;" onclick="location.reload()">RETAKE TEST</button>
        <div class="signature">by ClairoDaily</div>
    </div>
</div>

<div class="music-player-ctrl">
    <button id="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
</div>

<script>
    const questions = [
        { q: "深夜独自一人时，你更倾向于？", options: { A: "开一点轻快的音乐顺便自拍", B: "陷入一段挥之不去的旧回忆", C: "点亮香薰，享受当下的宁静", D: "给心仪的人发一段意味深长的话" }},
        { q: "你理想中的旅行目的地是？", options: { A: "充满活力的街头跳蚤市场", B: "潮湿的古老城市", C: "深山里的木屋", D: "午后咖啡馆" }},
        { q: "哪种声音最让你感到治愈？", options: { A: "录音机的电流声", B: "敲击车窗的雨声", C: "森林里的鸟鸣", D: "冰块撞击杯子的声音" }},
        { q: "把感情比作物件？", options: { A: "一张曝光的照片", B: "一件旧卫衣", C: "一个小盆栽", D: "一瓶昂贵香水" }},
        { q: "在社交场合中，你通常扮演？", options: { A: "搞怪活跃的人", B: "照顾朋友的人", C: "角落观察的人", D: "难以捉摸的人" }},
        { q: "哪种穿着最自信？", options: { A: "多巴胺混搭", B: "大号连帽衫", C: "素色棉麻", D: "复古真丝" }},
        { q: "如何看待“孤独”？", options: { A: "灵感来源", B: "自由重生", C: "无法逃避的常态", D: "清醒的高级状态" }},
        { q: "房间装饰风格？", options: { A: "杂志和海报", B: "植物和暖灯", C: "极简小秘密", D: "电影质感" }},
        { q: "面对未来？", options: { A: "顺其自然", B: "渴望安稳", C: "忧虑但尝试", D: "优雅掌控" }},
        { q: "此刻想喝？", options: { A: "苏打水", B: "热牛奶或草本茶", C: "一杯浓烈的黑咖啡", D: "一杯曼哈顿鸡尾酒" }},
        { q: "当关系结束，你通常会？", options: { A: "立刻找朋友派对宣泄", B: "写一首只有自己懂的诗", C: "独自旅行自我疗愈", D: "冷静但深夜反复翻看记录" }},
        { q: "你更偏向于哪一种“怀旧”？", options: { A: "互联网像素", B: "80年代合成器", C: "70年代木吉他", D: "60年代爵士" }},
        { q: "你的生活像哪种电影？", options: { A: "公路片", B: "艺术片", C: "纪实片", D: "情感片" }},
        { q: "哪种艺术最触动你？", options: { A: "Vlog", B: "胶片", C: "陶瓷", D: "黑胶" }},
        { q: "希望结果告诉你？", options: { A: "我依然纯真", B: "脆弱被理解", C: "找到宁静", D: "我是迷人且高级的" }}
    ];

    const songs = {
        'A': [
            { title: "Pretty Girl", lyric: "\"I could be a pretty girl, I'll wear a skirt for you.\"", desc: "Bedroom lo-fi 幻想家。哪怕生活模糊不清，也能把它变成艺术。" },
            { title: "Flaming Hot Cheetos", lyric: "\"I'm sent for you, I'm sent for you.\"", desc: "随性复古酷劲。你是即兴派对，拥有化腐朽为神奇的魅力。" },
            { title: "4EVER", lyric: "\"Is it last forever? Or summer's end?\"", desc: "向往永恒夏日。复古且充满活力的节奏是你生活的底色。" },
            { title: "Hello?", lyric: "\"I'm just a little bit out of my mind.\"", desc: "你是先开口问候的人，内心充满好奇与青涩探索欲。" },
            { title: "B.O.M.D.", lyric: "\"You're the boy of my dreams.\"", desc: "纯真美学代言人。总能在人群中发现让你心跳加速的梦中人。" }
        ],
        'B': [
            { title: "Bags", lyric: "\"Can you see me? I'm waiting for the right time.\"", desc: "明白脆弱才是最强大武器，在情感拉扯中学会了优雅安放。" },
            { title: "Sofia", lyric: "\"Sofia, know that you and I shouldn't feel like a crime.\"", desc: "直面内心最热烈渴望。你的爱坚定、勇敢且富有生命力。" },
            { title: "Alewife", lyric: "\"Eighty-some days and I'm still alive.\"", desc: "有一颗细腻感恩的心。在黑暗时刻总能找到救命稻草。" },
            { title: "Softly", lyric: "\"Touch me softly, don't let it go.\"", desc: "温柔对待世界。轻盈的节奏是你对自由最深处的向往。" },
            { title: "Impossible", lyric: "\"I'm a little bit tired of this.\"", desc: "清醒的浪漫主义。明白遗憾是常态，但在其中保持独特审美。" }
        ],
        'C': [
            { title: "Blouse", lyric: "\"Why do I tell you how I feel? When you're just looking at my blouse.\"", desc: "宁静旷野的吟唱者。沉静、宽厚，充满了回归大地的宁静感。" },
            { title: "Amoeba", lyric: "\"Show up to the party just to leave.\"", desc: "在琐碎中思考存在意义。有着顽强、低调且迷人的生命力。" },
            { title: "Zinnias", lyric: "\"Quietly, I'll be the one you need.\"", desc: "向往田园牧歌。渴望在属于自己的土地上种下宁静的希望。" },
            { title: "Just For Today", lyric: "\"I'm just trying to make it through.\"", desc: "深情的观察者。明白有些情感只需要在“今天”得到释放。" },
            { title: "Management", lyric: "\"Complain to the management.\"", desc: "寻找掌控生活的能力。迷茫中最终会在音乐中找到新的秩序。" }
        ],
        'D': [
            { title: "Juna", lyric: "\"You make me feel like a girl, go on and try it.\"", desc: "掌控审美的张力。轻盈灵动，是社交场合中难以捉摸的神秘人。" },
            { title: "Sexy to Someone", lyric: "\"I'm sexy to someone, I'm sure.\"", desc: "自信展示张力。这种复古而时髦的能量让你在人群中熠熠生辉。" },
            { title: "Add Up My Love", lyric: "\"You're the one I'm thinking of.\"", desc: "对感情有精准计算与热烈投入。复古节奏是你多情的跳动。" },
            { title: "Terrapin", lyric: "\"Slow down, you're moving too fast.\"", desc: "像优雅的玳瑁。在时间流动中慢行，享受生活最真实的质感。" },
            { title: "Nomad", lyric: "\"I'm a nomad, I'm a traveler.\"", desc: "流浪之心，不愿被定义。你在不同情绪与风景中自由迁徙。" }
        ]
    };

    let scores = { A: 0, B: 0, C: 0, D: 0 };
    let currentStep = 0;
    let choiceHistory = [];
    const audio = document.getElementById('bgm');
    const musicBtn = document.getElementById('music-toggle');

    function toggleMusic() {
        if (audio.paused) { audio.play(); musicBtn.classList.add('rotating'); }
        else { audio.pause(); musicBtn.classList.remove('rotating'); }
    }

    function startQuiz() {
        document.getElementById('intro-page').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        audio.play().catch(() => {});
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentStep];
        document.getElementById('q-meta').innerText = `QUESTION ${String(currentStep + 1).padStart(2, '0')} / 15`;
        document.getElementById('question-display').innerHTML = `
            <div class="question-text">${qData.q}</div>
            ${Object.entries(qData.options).map(([k, v]) => `<button class="option-btn" onclick="handleSelect('${k}')">${v}</button>`).join('')}
        `;
        document.getElementById('progress').style.width = ((currentStep + 1) / questions.length) * 100 + '%';
        document.getElementById('back-link').style.display = currentStep > 0 ? 'inline-block' : 'none';
    }

    function handleSelect(key) {
        scores[key]++;
        choiceHistory.push(key);
        if (currentStep < questions.length - 1) { currentStep++; renderQuestion(); }
        else { showResult(); }
    }

    function prevQuestion() {
        if (currentStep > 0) { scores[choiceHistory.pop()]--; currentStep--; renderQuestion(); }
    }

    function showResult() {
        document.getElementById('quiz-content').style.display = 'none';
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const albumPool = songs[winner];
        const main = albumPool[Math.floor(Math.random() * albumPool.length)];
        
        document.getElementById('result-img').src = { A: 'diary001.JPG', B: 'immunity.JPG', C: 'sling.jpg', D: 'charm.JPG' }[winner];
        document.getElementById('result-title').innerText = main.title;
        document.getElementById('result-lyric').innerText = main.lyric;
        document.getElementById('result-desc').innerText = main.desc;

        let allPool = [];
        Object.keys(songs).forEach(key => {
            const weight = (scores[key] + 1) / (questions.length + 4);
            songs[key].forEach(s => {
                if(s.title !== main.title) {
                    allPool.push({ title: s.title, rel: (weight * 65 + 15 + Math.random() * 20).toFixed(1) });
                }
            });
        });
        const top5 = allPool.sort((a, b) => b.rel - a.rel).slice(0, 5);
        document.getElementById('track-list-container').innerHTML = top5.map(s => `
            <div class="track-item">
                <span>${s.title}</span>
                <div style="display:flex; align-items:center;">
                    <span style="font-family:'Bodoni Moda'; font-style:italic; color:var(--primary); font-weight:500;">${s.rel}%</span>
                    <div class="match-bar-visual"><div class="match-bar-fill" style="width:${s.rel}%;"></div></div>
                </div>
            </div>`).join('');

        document.getElementById('result-container').style.display = 'block';
        document.getElementById('progress').style.width = '100%';
    }
</script>
</body>
</html>
