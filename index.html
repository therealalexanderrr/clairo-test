<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clairo Era Personality Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6b7a6d; 
            --glass: rgba(255, 255, 255, 0.88);
            --text-main: #333;
            --text-sub: #888;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* 保持大写后缀的 charm-bg.JPG */
            background: linear-gradient(rgba(245, 242, 235, 0.4), rgba(234, 221, 202, 0.4)), 
                        url('charm-bg.JPG') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #quiz-container {
            width: 88%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            text-align: center;
        }

        /* 音乐播放器 */
        .music-player { position: absolute; top: 20px; right: 20px; z-index: 10; }
        #music-toggle {
            background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50%; width: 38px; height: 38px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .rotating { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 圆形图片 */
        .clairo-avatar {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 3px solid white; box-shadow: 0 6px 18px rgba(0,0,0,0.07); margin-bottom: 25px;
        }

        /* 标题字体 */
        h1, #result-title {
            font-family: 'Bodoni Moda', serif; font-weight: 400; font-style: italic;
            color: var(--primary); letter-spacing: -0.04em; margin: 0;
        }
        h1 { font-size: 2.5rem; margin-bottom: 8px; }
        #result-title { font-size: 2.8rem; margin-bottom: 15px; }

        .subtitle, .result-header {
            font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 1rem;
            color: var(--text-sub); margin-bottom: 35px;
        }

        /* 问题区域 */
        #quiz-content { display: none; text-align: left; }
        .question-text { 
            font-family: "STSong", "SimSun", "Songti SC", serif; 
            font-size: 1.2rem; 
            margin-bottom: 25px; 
            font-weight: 600; 
            color: #000;
        }

        /* 选项按钮 - 黑色、斜体、宋体 */
        .option-btn {
            display: block; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0,0,0,0.04); 
            padding: 18px 20px; 
            margin-bottom: 12px;
            border-radius: 12px; 
            cursor: pointer; 
            font-family: "STSong", "SimSun", "Songti SC", serif; 
            font-style: italic;
            font-size: 1.05rem; 
            text-align: left;
            color: #000; 
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:hover { 
            background: white; 
            border-color: var(--primary); 
            transform: translateX(3px); 
        }

        .primary-btn {
            background: var(--primary); color: white; border: none; padding: 16px 50px;
            border-radius: 30px; font-size: 1rem; cursor: pointer; transition: 0.3s;
        }

        #result-container { display: none; }
        #result-desc { 
            font-family: "STSong", "SimSun", "Songti SC", serif; 
            font-size: 1rem; 
            line-height: 1.8; 
            color: #222; 
            margin-bottom: 30px; 
        }
    </style>
</head>
<body>

<div class="music-player">
    <button id="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
</div>

<div id="quiz-container">
    <div id="intro">
        <img src="clairo.jpg" alt="Intro" class="clairo-avatar">
        <h1>Clairo Era</h1>
        <div class="subtitle">Which track defines your soul?</div>
        <button class="primary-btn" onclick="startQuiz()">开始测试</button>
    </div>

    <div id="quiz-content">
        <div id="question-display"></div>
    </div>

    <div id="result-container">
        <img src="clairo2.JPG" alt="Result" class="clairo-avatar">
        <div class="result-header">Your soul matches</div>
        <div id="result-title"></div>
        <div id="result-desc" style="margin-top:20px;"></div>
        <button class="option-btn" style="text-align:center; border:none; color:var(--primary); font-weight:bold; letter-spacing: 2px;" onclick="location.reload()">RETAKE TEST</button>
    </div>
</div>

<script>
    const questions = [
        { q: "深夜独自一人时，你更倾向于？", options: { A: "开一点轻快的音乐顺便自拍", B: "陷入一段挥之不去的旧回忆", C: "点亮香薰，享受当下的宁静", D: "给心仪的人发一段意味深长的话" }},
        { q: "你理想中的旅行目的地是？", options: { A: "街头跳蚤市场", B: "潮湿的古老城市", C: "深山里的木屋", D: "复古午后咖啡馆" }},
        { q: "哪种声音最让你感到治愈？", options: { A: "老录音机的底噪", B: "雨点敲击车窗", C: "森林里的鸟鸣", D: "冰块撞击杯子" }},
        { q: "如果要把一段感情比作一种物件？", options: { A: "曝光过度的照片", B: "一件洗得发白的旧卫衣", C: "一个精心打理的小盆栽", D: "挥发中的昂贵香水" }},
        { q: "在社交场合中，你通常扮演？", options: { A: "活跃气氛的人", B: "角落里的观察者", C: "照顾朋友的人", D: "神秘且引人注目" }},
        { q: "哪种穿着风格让你最自信？", options: { A: "趣味混搭", B: "大号连帽衫", C: "素色棉麻", D: "复古廓形" }},
        { q: "你如何看待“孤独”？", options: { A: "创作灵感来源", B: "一种酸楚的常态", C: "一种自由", D: "高级的清醒" }},
        { q: "你的房间装饰风格是？", options: { A: "海报与杂志", B: "极简暗藏秘密", C: "植物与暖灯", D: "电影感与质感" }},
        { q: "面对未来，你的心态更接近？", options: { A: "顺其自然", B: "忧虑但想尝试", C: "寻找归属", D: "优雅掌控" }},
        { q: "最后，选择你此刻想喝的？", options: { A: "苏打水", B: "黑咖啡", C: "草本茶", D: "鸡尾酒" }}
    ];

    let scores = { A: 0, B: 0, C: 0, D: 0 };
    let currentStep = 0;
    const audio = document.getElementById('bgm');
    const musicBtn = document.getElementById('music-toggle');

    function toggleMusic() {
        if (audio.paused) { audio.play(); musicBtn.classList.add('rotating'); }
        else { audio.pause(); musicBtn.classList.remove('rotating'); }
    }

    function startQuiz() {
        document.getElementById('intro').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        audio.play().then(() => musicBtn.classList.add('rotating')).catch(() => {});
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentStep];
        const display = document.getElementById('question-display');
        display.innerHTML = `<div class="question-box active"><p class="question-text">${qData.q}</p>${Object.entries(qData.options).map(([k, v]) => `<button class="option-btn" onclick="handleSelect('${k}')">${v}</button>`).join('')}</div>`;
    }

    function handleSelect(key) {
        scores[key]++;
        if (currentStep < questions.length - 1) { currentStep++; renderQuestion(); }
        else { showResult(); }
    }

    function showResult() {
        document.getElementById('quiz-content').style.display = 'none';
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const res = {
            'A': { name: "Diary 001", desc: "你是最青涩灵动的侧面。生活是卧室里的即兴舞会，你拥有化腐朽为神奇的超能力。" },
            'B': { name: "Immunity", desc: "你拥有最深刻的灵魂。明白脆弱是最强大的武器，像雨后的蓝调，忧郁且治愈。" },
            'C': { name: "Sling", desc: "你步入了宁静的旷野。在沉思中稳固内心的根基，像一首温厚的民谣。" },
            'D': { name: "Charm", desc: "你是美学的集大成者。散发着复古而时髦的光芒，让生活充满浪漫的张力。" }
        };
        document.getElementById('result-title').innerText = res[winner].name;
        document.getElementById('result-desc').innerText = res[winner].desc;
        document.getElementById('result-container').style.display = 'block';
    }
</script>
</body>
</html>
